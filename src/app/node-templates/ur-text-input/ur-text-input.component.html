<div #container>
    @if (access.read || data.accessBehavior !== 'hide') {
        @if (data.mode !== 'tel') {
            <mat-form-field class="example-full-width healthIndicator" appearance="outline">
                <span [innerHTML]="valueIn" hidden></span>
                <mat-label>{{ label }}</mat-label>
                @if (data.mode === 'email') {
                    <span matPrefix>
                        <mat-icon class="mr-2">email</mat-icon>
                    </span>
                }
                @if (data.mode === 'color') {
                    <span matPrefix>
                        <mat-icon class="mr-2">color_lens</mat-icon>
                    </span>
                }
                <input
                    matInput
                    #myInputarea
                    [type]="data.mode"
                    [value]="access.read ? stripHTML(valueIn) : ''"
                    [disabled]="disabled || (access.write === false && data.accessBehavior === 'disable')"
                    (keyup)="delay > 0 && keyup($event.target.value)"
                    (change)="delay === 0 && change($event.target.value)"
                    #tooltip="matTooltip"
                    [matTooltip]="data.tooltip"
                    matTooltipPosition="below"
                />
            </mat-form-field>
        }

        @if (data.mode === 'tel') {
            <mat-form-field class="example-full-width healthIndicator" appearance="outline">
                <span [innerHTML]="valueIn" hidden></span>
                <mat-label>{{ label }}</mat-label>
                <span matPrefix>
                    <mat-icon class="mr-2">phone</mat-icon>
                </span>
                <input
                    matInput
                    placeholder="EX: (435) 345-3454"
                    mask="(000) 000-0000"
                    [value]="access.read ? stripHTML(valueIn) : ''"
                    [disabled]="disabled || (access.write === false && data.accessBehavior === 'disable')"
                    (keyup)="delay > 0 && keyup($event.target.value)"
                    (change)="delay === 0 && change($event.target.value)"
                    #tooltip="matTooltip"
                    [matTooltip]="data.tooltip"
                    matTooltipPosition="below"
                />
            </mat-form-field>
        }
    }
</div>
